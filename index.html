<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunia Belajar Anak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #f0f9ff;
            touch-action: manipulation;
            overflow-x: hidden;
        }
        .kids-font { font-family: 'Fredoka One', cursive; }
        .card-bounce:active { transform: scale(0.95); }
        .menu-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .menu-btn:hover { transform: scale(1.05); }
        .hidden-section { display: none; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
        
        .number-card {
            transition: all 0.2s;
        }
        .number-card:active {
            transform: translateY(5px);
            background-color: #fef3c7;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 relative overflow-hidden">

    <div class="bubble w-20 h-20 top-10 left-10"></div>
    <div class="bubble w-32 h-32 bottom-20 right-10"></div>

    <!-- Header -->
    <header id="header" class="w-full max-w-2xl text-center mb-6 mt-4">
        <h1 class="kids-font text-4xl md:text-5xl text-blue-600 drop-shadow-md">🌟 Dunia Belajar 🌟</h1>
        <p class="text-gray-600 font-bold mt-2 italic text-lg">Main yuk, Pintar itu seru!</p>
    </header>

    <!-- Main Menu -->
    <main id="main-menu" class="grid grid-cols-2 gap-4 w-full max-w-2xl">
        <button onclick="showSection('angka')" class="menu-btn bg-orange-400 p-6 rounded-3xl shadow-lg border-b-8 border-orange-600 text-white card-bounce">
            <div class="text-5xl mb-2">🔢</div>
            <div class="kids-font text-xl">Angka</div>
        </button>
        <button onclick="showSection('huruf')" class="menu-btn bg-blue-400 p-6 rounded-3xl shadow-lg border-b-8 border-blue-600 text-white card-bounce">
            <div class="text-5xl mb-2">🔤</div>
            <div class="kids-font text-xl">Huruf</div>
        </button>
        <button onclick="showSection('warna')" class="menu-btn bg-green-400 p-6 rounded-3xl shadow-lg border-b-8 border-green-600 text-white card-bounce">
            <div class="text-5xl mb-2">🎨</div>
            <div class="kids-font text-xl">Warna</div>
        </button>
        <button onclick="showSection('hewan')" class="menu-btn bg-purple-400 p-6 rounded-3xl shadow-lg border-b-8 border-purple-600 text-white card-bounce">
            <div class="text-5xl mb-2">🦁</div>
            <div class="kids-font text-xl">Hewan</div>
        </button>
    </main>

    <!-- Modul: Mengenal Angka (Update untuk Usia 3 Tahun) -->
    <section id="angka" class="hidden-section w-full max-w-2xl text-center">
        <div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-orange-400">
            <h2 class="kids-font text-3xl text-orange-500 mb-4">Ayo Kenal Angka!</h2>
            
            <!-- Area Display Utama -->
            <div class="bg-orange-50 p-6 rounded-2xl mb-6 min-h-[220px] flex flex-col items-center justify-center border-2 border-dashed border-orange-200">
                <div id="big-number" class="text-9xl kids-font text-orange-500 floating">1</div>
                <div id="number-objects" class="text-3xl mt-4 flex flex-wrap justify-center gap-2">🍎</div>
            </div>

            <!-- Grid Angka 1-10 -->
            <div class="grid grid-cols-5 gap-2">
                <!-- Tombol 1-10 di-generate via JS -->
            </div>
        </div>
    </section>

    <!-- Modul: Huruf -->
    <section id="huruf" class="hidden-section w-full max-w-2xl text-center">
        <div class="bg-white p-8 rounded-3xl shadow-xl border-4 border-blue-400">
            <h2 class="kids-font text-3xl text-blue-500 mb-6">Tebak Huruf</h2>
            <div id="letter-big" class="text-9xl kids-font text-blue-600 mb-8 floating cursor-pointer" onclick="speakCurrentLetter()">A</div>
            <p id="letter-word" class="text-2xl font-bold text-gray-700 mb-6">A untuk Apel 🍎</p>
            <button onclick="nextLetter()" class="bg-blue-500 text-white px-8 py-4 rounded-full font-bold shadow-lg hover:bg-blue-600 text-xl">Lanjut ➔</button>
        </div>
    </section>

    <!-- Modul: Warna -->
    <section id="warna" class="hidden-section w-full max-w-2xl text-center">
        <div class="bg-white p-8 rounded-3xl shadow-xl border-4 border-green-400">
            <h2 class="kids-font text-3xl text-green-500 mb-6">Mengenal Warna</h2>
            <div id="color-box" class="w-full h-40 rounded-2xl mb-6 shadow-inner border-4 border-gray-100 transition-all duration-500 cursor-pointer" onclick="speakCurrentColor()"></div>
            <h3 id="color-name" class="kids-font text-4xl mb-8 uppercase tracking-widest">Merah</h3>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="changeColor('Merah', '#ef4444')" class="h-16 rounded-xl bg-red-500 shadow-md border-b-4 border-red-700 active:translate-y-1"></button>
                <button onclick="changeColor('Biru', '#3b82f6')" class="h-16 rounded-xl bg-blue-500 shadow-md border-b-4 border-blue-700 active:translate-y-1"></button>
                <button onclick="changeColor('Hijau', '#22c55e')" class="h-16 rounded-xl bg-green-500 shadow-md border-b-4 border-green-700 active:translate-y-1"></button>
                <button onclick="changeColor('Kuning', '#eab308')" class="h-16 rounded-xl bg-yellow-400 shadow-md border-b-4 border-yellow-600 active:translate-y-1"></button>
                <button onclick="changeColor('Oranye', '#f97316')" class="h-16 rounded-xl bg-orange-500 shadow-md border-b-4 border-orange-700 active:translate-y-1"></button>
                <button onclick="changeColor('Ungu', '#a855f7')" class="h-16 rounded-xl bg-purple-500 shadow-md border-b-4 border-purple-700 active:translate-y-1"></button>
            </div>
        </div>
    </section>

    <!-- Modul: Hewan -->
    <section id="hewan" class="hidden-section w-full max-w-2xl text-center">
        <div class="bg-white p-8 rounded-3xl shadow-xl border-4 border-purple-400">
            <h2 class="kids-font text-3xl text-purple-500 mb-6">Suara Hewan</h2>
            <div id="animal-emoji" class="text-9xl mb-4 floating cursor-pointer" onclick="speakAnimal()">🦁</div>
            <h3 id="animal-name" class="kids-font text-3xl text-gray-700 mb-8">Singa</h3>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="pickAnimal('🦁', 'Singa', 'Rawrrr!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-4xl">🦁</button>
                <button onclick="pickAnimal('🐱', 'Kucing', 'Meong!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-4xl">🐱</button>
                <button onclick="pickAnimal('🐶', 'Anjing', 'Guk Guk!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-4xl">🐶</button>
                <button onclick="pickAnimal('🐮', 'Sapi', 'Mooo!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-4xl">🐮</button>
                <button onclick="pickAnimal('🐥', 'Ayam', 'Petok Petok!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-4xl">🐥</button>
                <button onclick="pickAnimal('🐘', 'Gajah', 'Preeeet!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-4xl">🐘</button>
            </div>
            <div id="animal-sound" class="mt-6 text-2xl kids-font text-purple-600 h-8"></div>
        </div>
    </section>

    <!-- Tombol Kembali -->
    <button id="back-btn" onclick="goHome()" class="hidden-section mt-8 bg-blue-600 text-white px-10 py-3 rounded-full font-bold shadow-lg flex items-center gap-2 card-bounce">
        🏠 Kembali ke Menu
    </button>

    <script>
        // --- Sistem Suara ---
        function say(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.lang = 'id-ID';
                msg.rate = 0.85; 
                msg.pitch = 1.3;
                window.speechSynthesis.speak(msg);
            }
        }

        const alphabets = [
            { h: 'A', w: 'Apel', e: '🍎' }, { h: 'B', w: 'Bola', e: '⚽' }, { h: 'C', w: 'Cicak', e: '🦎' },
            { h: 'D', w: 'Donat', e: '🍩' }, { h: 'E', w: 'Es Krim', e: '🍦' }, { h: 'F', w: 'Flamingo', e: '🦩' },
            { h: 'G', w: 'Gajah', e: '🐘' }, { h: 'H', w: 'Hujan', e: '🌧️' }, { h: 'I', w: 'Ikan', e: '🐟' },
            { h: 'J', w: 'Jerapah', e: '🦒' }, { h: 'K', w: 'Kucing', e: '🐱' }
        ];
        
        const numberEmojis = ['🍎', '⭐️', '🎈', '🍬', '🚗', '🐥', '🍄', '🍪', '🐝', '🎨'];
        let letterIdx = 0;
        let activeColor = "Merah";
        let activeAnimal = { name: "Singa", sound: "Rawrr" };

        function showSection(id) {
            document.getElementById('main-menu').classList.add('hidden-section');
            document.getElementById('header').classList.add('hidden-section');
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            
            document.getElementById(id).classList.remove('hidden-section');
            document.getElementById('back-btn').classList.remove('hidden-section');
            
            if(id === 'angka') {
                say("Ayo belajar angka!");
                initNumbers();
            }
            if(id === 'huruf') {
                say("Mari mengenal huruf!");
                updateLetterUI();
            }
            if(id === 'warna') {
                say("Warna apa ini?");
                changeColor('Merah', '#ef4444');
            }
            if(id === 'hewan') {
                say("Ayo dengar suara hewan!");
                pickAnimal('🦁', 'Singa', 'Rawrrr!');
            }
        }

        function goHome() {
            window.speechSynthesis.cancel();
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById('back-btn').classList.add('hidden-section');
            document.getElementById('main-menu').classList.remove('hidden-section');
            document.getElementById('header').classList.remove('hidden-section');
            say("Main lagi yuk!");
        }

        // --- Logika Mengenal Angka ---
        function initNumbers() {
            const grid = document.querySelector('#angka .grid');
            grid.innerHTML = '';
            for(let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = "bg-orange-100 p-4 rounded-xl text-2xl kids-font text-orange-600 border-b-4 border-orange-200 number-card shadow-sm";
                btn.innerText = i;
                btn.onclick = () => selectNumber(i);
                grid.appendChild(btn);
            }
            selectNumber(1);
        }

        function selectNumber(num) {
            const displayNum = document.getElementById('big-number');
            const displayObj = document.getElementById('number-objects');
            
            displayNum.innerText = num;
            
            // Animasi Bounce
            displayNum.style.animation = 'none';
            displayNum.offsetHeight; // trigger reflow
            displayNum.style.animation = 'float 3s ease-in-out infinite';

            // Tampilkan emoji sebanyak angka
            const emoji = numberEmojis[num-1] || '🍎';
            displayObj.innerHTML = '';
            for(let i = 0; i < num; i++) {
                const span = document.createElement('span');
                span.innerText = emoji;
                span.className = "inline-block animate-bounce";
                span.style.animationDelay = (i * 0.1) + "s";
                displayObj.appendChild(span);
            }
            
            say("Angka " + num);
        }

        // --- Logika Huruf ---
        function updateLetterUI() {
            const item = alphabets[letterIdx];
            document.getElementById('letter-big').innerText = item.h;
            document.getElementById('letter-word').innerText = item.h + " untuk " + item.w + " " + item.e;
            speakCurrentLetter();
        }

        function nextLetter() {
            letterIdx = (letterIdx + 1) % alphabets.length;
            updateLetterUI();
        }

        function speakCurrentLetter() {
            const item = alphabets[letterIdx];
            say("Huruf " + item.h + ". " + item.h + " untuk " + item.w);
        }

        // --- Logika Warna ---
        function changeColor(name, hex) {
            activeColor = name;
            const box = document.getElementById('color-box');
            const text = document.getElementById('color-name');
            box.style.backgroundColor = hex;
            text.innerText = name;
            text.style.color = hex;
            speakCurrentColor();
        }

        function speakCurrentColor() {
            say("Warna " + activeColor);
        }

        // --- Logika Hewan ---
        function pickAnimal(emoji, name, sound) {
            activeAnimal = { name, sound };
            document.getElementById('animal-emoji').innerText = emoji;
            document.getElementById('animal-name').innerText = name;
            document.getElementById('animal-sound').innerText = sound;
            speakAnimal();
        }

        function speakAnimal() {
            say(activeAnimal.name + ". Suaranya " + activeAnimal.sound);
        }
    </script>
</body>
</html>
