<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunia Belajar Anak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #f0f9ff;
            touch-action: manipulation;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .kids-font { font-family: 'Fredoka One', cursive; }
        .card-bounce:active { transform: scale(0.95); }
        .hidden-section { display: none !important; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
        .progress-fill { transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .grid-scroll {
            max-height: 55vh;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: thin;
        }

        /* Gaya TV */
        .tv-frame {
            background: #334155;
            padding: 15px;
            border-radius: 2rem;
            border-bottom: 12px solid #1e293b;
            position: relative;
            margin-bottom: 20px;
        }
        .tv-antenna {
            width: 4px; height: 30px;
            background: #475569;
            margin: -40px auto 10px;
            position: relative;
        }
        .tv-antenna::before {
            content: ''; position: absolute;
            top: -5px; left: -3px;
            width: 10px; height: 10px;
            background: #ef4444; border-radius: 50%;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 0.5rem;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .category-tab {
            transition: all 0.3s;
        }
        .category-tab.active {
            background-color: #f43f5e;
            color: white;
            transform: scale(1.05);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 relative text-slate-800">

    <!-- Beranda -->
    <div id="home-container" class="w-full max-w-2xl flex flex-col items-center">
        <div class="w-full bg-white rounded-3xl p-4 shadow-md mb-6 flex flex-col items-center border-b-4 border-blue-100">
            <div class="flex justify-between w-full items-center mb-2 px-2">
                <div class="flex items-center gap-2">
                    <span class="text-3xl">🏆</span>
                    <span id="level-badge" class="kids-font text-2xl text-blue-600">Level 1</span>
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-2xl">⭐</span>
                    <span id="total-stars" class="kids-font text-xl text-orange-500">0</span>
                </div>
            </div>
            <div class="w-full bg-gray-100 h-6 rounded-full overflow-hidden border-2 border-gray-50 p-1">
                <div id="progress-bar" class="progress-fill bg-gradient-to-r from-yellow-400 to-orange-500 h-full rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <header class="text-center mb-6">
            <h1 class="kids-font text-5xl text-blue-600 drop-shadow-md">Dunia Belajar</h1>
        </header>

        <main class="grid grid-cols-2 gap-4 w-full px-2">
            <button onclick="showSection('angka')" class="bg-orange-400 p-6 rounded-3xl shadow-lg border-b-8 border-orange-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🔢</div>
                <div class="kids-font text-xl">Angka</div>
            </button>
            <button onclick="showSection('huruf')" class="bg-blue-400 p-6 rounded-3xl shadow-lg border-b-8 border-blue-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🔤</div>
                <div class="kids-font text-xl">Huruf</div>
            </button>
            <button onclick="showSection('warna')" class="bg-green-400 p-6 rounded-3xl shadow-lg border-b-8 border-green-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🎨</div>
                <div class="kids-font text-xl">Warna</div>
            </button>
            <button onclick="showSection('hewan')" class="bg-purple-400 p-6 rounded-3xl shadow-lg border-b-8 border-purple-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🦁</div>
                <div class="kids-font text-xl">Dunia Hewan</div>
            </button>
            <button onclick="showSection('mobil')" class="bg-slate-700 p-6 rounded-3xl shadow-lg border-b-8 border-slate-900 text-white card-bounce flex flex-col items-center col-span-2">
                <div class="text-5xl mb-2">🏎️</div>
                <div class="kids-font text-xl">Garasi Kendaraan</div>
            </button>
            <button onclick="showSection('cocok')" class="bg-red-400 p-4 rounded-3xl shadow-lg border-b-8 border-red-600 text-white card-bounce flex flex-col items-center">
                <div class="text-4xl mb-2">🧩</div>
                <div class="kids-font text-lg">Cocokkan</div>
            </button>
            <button onclick="showSection('video')" class="bg-rose-500 p-4 rounded-3xl shadow-lg border-b-8 border-rose-700 text-white card-bounce flex flex-col items-center">
                <div class="text-4xl mb-2">📺</div>
                <div class="kids-font text-lg">Video TV</div>
            </button>
        </main>
    </div>

    <!-- Container Game -->

        <!-- Garasi Section -->

        <!-- Hewan Section -->

        </section>

        <!-- Warna Section -->
        <section id="warna" class="hidden-section text-center">
            <div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-green-400">

                <div id="color-box" class="w-full h-32 rounded-2xl mb-4 shadow-inner border-4 border-gray-100"></div>
                <h3 id="color-name" class="kids-font text-3xl mb-4 uppercase">Merah</h3>
                <div class="grid grid-cols-3 gap-2 grid-scroll" id="color-grid"></div>
            </div>
        </section>

        <!-- Video TV Section -->
        <section id="video" class="hidden-section text-center">
            <div class="bg-white p-4 rounded-3xl shadow-xl border-4 border-rose-400">
                <h2 class="kids-font text-2xl text-rose-500 mb-4">TV Edukasi Anak</h2>
                
                <!-- Tab Menu Video -->
                <div class="flex gap-2 overflow-x-auto mb-4 pb-2 no-scrollbar">
                    <button onclick="filterVideos('hewan', this)" class="category-tab active px-4 py-2 bg-rose-100 rounded-full kids-font text-sm whitespace-nowrap">🐾 Hewan</button>
                    <button onclick="filterVideos('mobil', this)" class="category-tab px-4 py-2 bg-rose-100 rounded-full kids-font text-sm whitespace-nowrap">🏎️ Kendaraan</button>
                    <button onclick="filterVideos('angka', this)" class="category-tab px-4 py-2 bg-rose-100 rounded-full kids-font text-sm whitespace-nowrap">🔢 Belajar</button>
                    <button onclick="filterVideos('lagu', this)" class="category-tab px-4 py-2 bg-rose-100 rounded-full kids-font text-sm whitespace-nowrap">🎵 Lagu Anak</button>
                </div>

                <div class="grid-scroll flex flex-col gap-4" id="video-list">
                    <!-- Video akan dimuat di sini secara dinamis -->
                </div>
            </div>
        </section>

        <!-- Matching Game Section -->
        <section id="cocok" class="hidden-section text-center">
            <div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-red-400">
                <h2 class="kids-font text-2xl text-red-500 mb-4">Pasangkan Gambar</h2>
                <div class="flex justify-around mb-6 p-4 bg-gray-50 rounded-2xl min-h-[110px]">
                    <div id="source-container" class="flex gap-3 flex-wrap justify-center"></div>
                </div>
                <div id="target-container" class="grid grid-cols-2 gap-4"></div>
                <button onclick="initMatchingGame()" class="mt-4 bg-red-500 text-white px-6 py-2 rounded-full font-bold shadow">Main Lagi</button>
            </div>
        </section>

        <div class="w-full flex justify-center mt-6 mb-10">
            <button onclick="goHome()" class="bg-gray-800 text-white px-10 py-4 rounded-full font-bold shadow-lg flex items-center gap-2 text-lg">
                🏠 Beranda
            </button>
        </div>
    </div>

        function speakRealistic(text, pitch = 1, rate = 1) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text.toString());
                msg.lang = 'id-ID';
                msg.pitch = pitch;
                msg.rate = rate;
                window.speechSynthesis.speak(msg);
            }
        }

        function addStar(amount = 1) {
            stars += amount;
            document.getElementById('total-stars').innerText = stars;
            document.getElementById('level-badge').innerText = "Level " + (Math.floor(stars/20) + 1);
            document.getElementById('progress-bar').style.width = ((stars % 20) * 5) + "%";
            if (stars > 0 && stars % 20 === 0) {
                confetti();
                speakRealistic("Luar biasa! Kamu naik level!", 1.5, 1);
            }
        }

        function showSection(id) {
            document.getElementById('home-container').classList.add('hidden-section');
            document.getElementById('game-container').classList.remove('hidden-section');
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            
            if(id === 'angka') initNumbers();
            if(id === 'huruf') initLetters();
            if(id === 'mobil') initCars();
            if(id === 'warna') initColors();
            if(id === 'hewan') initAnimals();
            if(id === 'cocok') initMatchingGame();
            if(id === 'video') filterVideos('hewan', document.querySelector('.category-tab'));
        }

        function initNumbers() {
            const grid = document.getElementById('number-grid');
            grid.innerHTML = '';
            for(let i = 1; i <= 20; i++) {
                const btn = document.createElement('button');
                btn.className = "bg-orange-100 p-4 rounded-xl text-2xl kids-font text-orange-600 border-b-4 border-orange-200 active:translate-y-1";
                btn.innerText = i;
                btn.onclick = () => {
                    document.getElementById('big-number').innerText = i;
                    const emoji = ['🍎', '⭐️', '🎈', '🍬', '🚗', '🐥', '🍄', '🍪', '🐝', '🎨', '🚀', '🌈', '🍦', '🍩', '🍔', '🍕', '🍉', '🍌', '🍇', '🍒', '🦒'][i-1] || '🍎';
                    const displayObj = document.getElementById('number-objects');
                    displayObj.innerHTML = '';
                    for(let k=0; k<i; k++) {
                        const s = document.createElement('span'); s.innerText = emoji; displayObj.appendChild(s);
                    }
                    speakRealistic(i, 1.2, 1);
                    addStar(1);
                };
                grid.appendChild(btn);
            }
        }

        function initLetters() {
            const grid = document.getElementById('letter-grid');
            grid.innerHTML = '';
            alphabets.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "bg-blue-100 p-3 rounded-xl text-xl kids-font text-blue-600 border-b-4 border-blue-200 active:translate-y-1";
                btn.innerText = item.h;
                btn.onclick = () => {
                    document.getElementById('letter-big').innerText = item.h;
                    document.getElementById('letter-word').innerText = item.h + " - " + item.w + " " + item.e;
                    speakRealistic(item.h + ". " + item.w, 1.2, 1);
                    addStar(1);
                };
                grid.appendChild(btn);
            });
        }

            cars.forEach(car => {
                const btn = document.createElement('button');
                btn.className = "p-3 bg-slate-50 rounded-2xl text-4xl shadow-md border-b-4 border-slate-200 active:scale-90 transition-all";
                btn.innerText = car.e;
                btn.onclick = () => {
                    document.getElementById('car-emoji').innerText = car.e;
                    document.getElementById('car-name').innerText = car.n;
                    speakRealistic(car.n, 1, 1);
                    setTimeout(() => speakRealistic(car.s, car.p, car.r), 800);
                    addStar(1);
                };
                grid.appendChild(btn);
            });
        }

        function initAnimals() {
            const grid = document.getElementById('animal-grid');
            grid.innerHTML = '';
            animals.forEach(a => {
                const btn = document.createElement('button');
                btn.className = "p-3 bg-purple-50 rounded-xl text-3xl border-b-4 border-purple-200 active:scale-90";
                btn.innerText = a.e;
                btn.onclick = () => {
                    document.getElementById('animal-emoji').innerText = a.e;
                    document.getElementById('animal-name').innerText = a.n;
                    speakRealistic(a.n, 1, 1);
                    setTimeout(() => speakRealistic(a.s, a.p, a.r), 800);
                    addStar(1);
                };
                grid.appendChild(btn);
            });
        }

        function initColors() {
            const grid = document.getElementById('color-grid');
            grid.innerHTML = '';
            colors.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "h-14 rounded-xl shadow-md border-b-4 border-black/10";
                btn.style.backgroundColor = c.h;
                btn.onclick = () => {
                    document.getElementById('color-box').style.backgroundColor = c.h;
                    document.getElementById('color-name').innerText = c.n;
                    document.getElementById('color-name').style.color = (c.n === 'Putih' ? '#000' : c.h);
                    speakRealistic(c.n, 1.2, 1);
                    addStar(1);
                };
                grid.appendChild(btn);
            });
        }

        function filterVideos(category, btn) {
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            if(btn) btn.classList.add('active');

            const container = document.getElementById('video-list');
            container.innerHTML = '';
            
            if (videos[category]) {
                videos[category].forEach(vid => {
                    const card = document.createElement('div');
                    card.className = "tv-frame shadow-lg";
                    card.innerHTML = `
                        <div class="tv-antenna"></div>
                        <h3 class="kids-font text-white mb-2 text-center text-sm">${vid.title}</h3>
                        <div class="video-wrapper">
                            <iframe src="https://www.youtube.com/embed/${vid.id}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        function initMatchingGame() {
            selectedSource = null;
            const source = document.getElementById('source-container');
            const target = document.getElementById('target-container');
            source.innerHTML = ''; target.innerHTML = '';

            const pool = animals.sort(() => Math.random() - 0.5).slice(0, 4);
            const items = [...pool].sort(() => Math.random() - 0.5);
            const targets = [...pool].sort(() => Math.random() - 0.5);

            items.forEach(item => {
                const el = document.createElement('div');
                el.className = "text-4xl p-3 bg-white rounded-xl shadow border-2 border-transparent cursor-pointer transition-all";
                el.innerText = item.e;
                el.onclick = () => {
                    selectedSource = item;
                    speakRealistic("Cari " + item.n, 1.2, 1);
                    Array.from(source.children).forEach(c => c.style.borderColor = 'transparent');
                    el.style.borderColor = '#ef4444';
                    el.style.backgroundColor = '#fef2f2';
                };
                source.appendChild(el);
            });

            targets.forEach(item => {
                const el = document.createElement('div');
                el.className = "h-24 flex items-center justify-center bg-gray-100 rounded-2xl border-4 border-dashed border-gray-200 text-4xl grayscale opacity-30 cursor-pointer";
                el.innerText = item.e;
                el.onclick = () => {
                    if (selectedSource && selectedSource.e === item.e) {
                        el.classList.remove('grayscale', 'opacity-30', 'bg-gray-100');
                        el.classList.add('bg-green-100', 'border-green-400', 'animate-bounce');
                        speakRealistic("Yeay! Benar!", 1.5, 1);
                        addStar(2);
                        selectedSource = null;
                        Array.from(source.children).forEach(c => {
                            if(c.innerText === item.e) c.style.visibility = 'hidden';
                        });
                        if (!Array.from(target.children).some(c => c.classList.contains('grayscale'))) {
                            setTimeout(() => { confetti(); initMatchingGame(); }, 1000);
                        }
                    }
                };
                target.appendChild(el);
            });
        }

        function goHome() {
            document.getElementById('game-container').classList.add('hidden-section');
            document.getElementById('home-container').classList.remove('hidden-section');
        }
    </script>
</body>
</html>
