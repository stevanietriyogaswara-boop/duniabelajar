<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunia Belajar Anak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #f0f9ff;
            touch-action: manipulation;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .kids-font { font-family: 'Fredoka One', cursive; }
        .card-bounce:active { transform: scale(0.92); }
        .hidden-section { display: none !important; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
        
        .grid-scroll {
            max-height: 40vh;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .tv-container {
            background: white;
            border-radius: 2rem;
            padding: 20px;
            border: 4px solid #ff7a8a;
            box-shadow: 0 10px 25px rgba(255, 122, 138, 0.2);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-bar {
            background: #fff;
            border: 3px solid #ffdee2;
            border-radius: 99px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn-cari {
            background: #ff4757;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .video-box {
            background: #2f3542;
            border-radius: 1.5rem;
            padding: 12px;
            border-bottom: 8px solid #1e272e;
            position: relative;
        }

        .video-inner {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 1rem;
            background: #000;
        }

        .video-inner iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .tab-video {
            padding: 8px 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .tab-video.active {
            background: #ff4757;
            color: white;
        }

        .tab-video.inactive {
            background: #ffe0e3;
            color: #ff4757;
        }

        /* List Video Scroll Style */
        .video-list-scroll {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 5px;
        }

        .video-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff5f6;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .video-item:hover { border-color: #ff7a8a; }

        .video-thumb {
            width: 60px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            background: #ddd;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(240, 249, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 10px 15px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e0f2fe;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>

        function vibrateDevice(ms = 30) { if (navigator.vibrate) navigator.vibrate(ms); }

        function startApp() {
            isAppStarted = true;
            document.getElementById('start-overlay').classList.add('hidden-section');
            document.getElementById('home-container').classList.remove('hidden-section');
            speakRealistic("Halo sayang, ayo belajar dan bermain!");
        }

        function speakRealistic(text) {
            if (!isAppStarted) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            msg.pitch = 1.2; 
            msg.rate = 1;
            window.speechSynthesis.speak(msg);
        }

        function addStar(amount = 1) {
            stars += amount;
            document.getElementById('total-stars').innerText = stars;
            document.getElementById('total-stars-header').innerText = stars;
            document.getElementById('level-badge').innerText = "Level " + (Math.floor(stars/30) + 1);
            document.getElementById('progress-bar').style.width = ((stars % 30) * 3.33) + "%";
        }

        function showSection(id) {
            vibrateDevice(30);
            document.getElementById('home-container').classList.add('hidden-section');
            document.getElementById('app-header').classList.remove('hidden-section');
            document.getElementById('game-container').classList.remove('hidden-section');
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            
            if(id === 'tv') fetchYouTubeVideos("lagu anak terpopuler");
            if(id === 'sehat') filterFood('buah');
            if(id === 'angka') initNumbers(); 
            if(id === 'huruf') initLetters(); 
            if(id === 'hewan') filterAnimal('darat');
            if(id === 'mobil') filterCar('darat');
            if(id === 'warna') initColors();
            if(id === 'cocok') initPuzzle();
        }

        // --- YOUTUBE LOGIC ---

            listContainer.innerHTML = '<div class="text-xs text-gray-400 py-4">Mencari video...</div>';
            
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&q=${encodeURIComponent(query)}&type=video&key=${YT_API_KEY}`);
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    listContainer.innerHTML = '';
                    data.items.forEach((item, index) => {
                        const videoId = item.id.videoId;
                        const title = item.snippet.title;
                        const thumb = item.snippet.thumbnails.default.url;
                        
                        if (index === 0) updateVideo(videoId); // Play first video automatically
                        
                        const div = document.createElement('div');
                        div.className = 'video-item';
                        div.onclick = () => {
                            updateVideo(videoId);
                            speakRealistic("Memutar video " + title.substring(0, 20));
                        };
                        div.innerHTML = `
                            <img src="${thumb}" class="video-thumb" alt="thumb">
                            <div class="text-xs font-bold text-left text-gray-700 truncate w-full">${title}</div>
                        `;
                        listContainer.appendChild(div);
                    });
                } else {
                    listContainer.innerHTML = '<div class="text-xs text-red-400 py-4">Video tidak ditemukan.</div>';
                }
            } catch (error) {
                listContainer.innerHTML = '<div class="text-xs text-red-400 py-4">Gagal memuat video. Periksa internet.</div>';
            }
        }

        function searchYouTube() {
            const query = document.getElementById('tv-search-input').value;
            if (query) {
                fetchYouTubeVideos(query + " lagu anak");
                vibrateDevice(50);
            }
        }

        function setTvCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-video').forEach(b => {
                b.classList.remove('active');
                b.classList.add('inactive');
            });
            document.getElementById(`tab-v-${cat}`).classList.replace('inactive', 'active');
            
            let query = "lagu anak indonesia";
            if (cat === 'belajar') query = "belajar angka huruf anak";
            if (cat === 'kartun') query = "kartun anak lucu";
            
            fetchYouTubeVideos(query);
        }

        function updateVideo(id) {
            const iframe = document.getElementById('tv-iframe');
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&rel=0`;
        }

        // --- DATA FILTER LOGIC (TETAP SAMA AGAR TIDAK ADA YANG TERHAPUS) ---
        function filterFood(type) {
            const tabs = ['buah', 'sayur'];
            tabs.forEach(t => {
                const b = document.getElementById(`tab-food-${t}`);
                b.className = "px-4 py-2 rounded-xl font-bold text-xs " + (t === type ? "bg-emerald-500 text-white" : "bg-emerald-200 text-emerald-700");
            });
            initGallery(foodDB[type], 'food-grid', 'food-emoji', 'food-name');
        }

        function filterAnimal(type) {
            const tabs = ['darat', 'air'];
            tabs.forEach(t => {
                const b = document.getElementById(`tab-animal-${t}`);
                if(b) b.className = "px-4 py-2 rounded-xl font-bold text-xs " + (t === type ? "bg-purple-500 text-white" : "bg-purple-200 text-purple-700");
            });
            initGallery(animalDB[type], 'animal-grid', 'animal-emoji', 'animal-name');
        }

        function filterCar(type) {
            const tabs = ['darat', 'laut', 'udara'];
            tabs.forEach(t => {
                const b = document.getElementById(`tab-car-${t}`);
                if(b) b.className = "px-3 py-2 rounded-xl font-bold text-xs " + (t === type ? "bg-slate-700 text-white" : "bg-slate-300 text-slate-700");
            });
            initGallery(carDB[type], 'car-grid', 'car-emoji', 'car-name');
        }

        function initGallery(db, gridId, emojiId, nameId) {
            const grid = document.getElementById(gridId); grid.innerHTML = '';
            db.forEach(item => {
                const b = document.createElement('button');
                b.className = `p-3 bg-white rounded-xl text-4xl shadow border-b-4 border-slate-100 active:scale-95 flex items-center justify-center`;
                b.innerText = item.e;
                b.onclick = () => {
                    document.getElementById(emojiId).innerText = item.e;
                    document.getElementById(nameId).innerText = item.n;
                    speakRealistic(item.n); addStar(1);
                };
                grid.appendChild(b);
            });
        }

        function initNumbers() {
            const grid = document.getElementById('number-grid'); grid.innerHTML = '';
            for(let i=1; i<=20; i++) {
                const b = document.createElement('button');
                b.className = "bg-orange-100 p-4 rounded-xl kids-font text-orange-600 border-b-4 border-orange-200 active:scale-95";
                b.innerText = i;
                b.onclick = () => {
                    document.getElementById('big-number').innerText = i;
                    document.getElementById('number-objects').innerHTML = '🍎'.repeat(i);
                    speakRealistic(i); addStar(1);
                };
                grid.appendChild(b);
            }
        }

        function initLetters() {
            const grid = document.getElementById('letter-grid'); grid.innerHTML = '';
            alphabets.forEach(a => {
                const b = document.createElement('button');
                b.className = "bg-blue-100 p-3 rounded-xl kids-font text-blue-600 border-b-4 border-blue-200 active:scale-95 text-xl";
                b.innerText = a.h;
                b.onclick = () => {
                    document.getElementById('letter-big').innerText = a.h;
                    document.getElementById('letter-word').innerText = a.w + " " + a.e;
                    speakRealistic(a.h + " untuk " + a.w); addStar(1);
                };
                grid.appendChild(b);
            });
        }

        function initColors() {
            const grid = document.getElementById('color-grid'); grid.innerHTML = '';
            colors.forEach(c => {
                const b = document.createElement('button'); b.className = "h-12 rounded-xl shadow border-4 border-white active:scale-95"; b.style.backgroundColor = c.h;
                b.onclick = () => { 
                    document.getElementById('color-box').style.backgroundColor = c.h; 
                    document.getElementById('color-name').innerText = c.n; 
                    speakRealistic(c.n); addStar(1); 
                };
                grid.appendChild(b);
            });
        }

        function initPuzzle() {
            const pool = [...animalDB.darat, ...carDB.darat, ...alphabets, ...foodDB.buah];
            const target = pool[Math.floor(Math.random() * pool.length)];
            const targetEl = document.getElementById('puzzle-target');
            targetEl.innerText = target.e || target.h;
            targetEl.classList.add('opacity-20', 'grayscale');

            const options = [target];
            while(options.length < 3) {
                const rand = pool[Math.floor(Math.random() * pool.length)];
                if(!options.includes(rand)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            const optGrid = document.getElementById('puzzle-options');
            optGrid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "text-[10px] font-bold p-3 bg-white rounded-2xl shadow-md border-b-4 border-slate-200 active:scale-90 flex items-center justify-center text-center uppercase h-24 w-24";
                btn.innerText = opt.n || opt.w;
                btn.onclick = () => {
                    if(opt === target) {
                        targetEl.classList.remove('opacity-20', 'grayscale');
                        confetti(); speakRealistic("Hebat! Kamu pintar sekali!");
                        addStar(10); setTimeout(initPuzzle, 2000);
                    } else {
                        vibrateDevice(100); speakRealistic("Ayo coba lagi!");
                    }
                };
                optGrid.appendChild(btn);
            });
        }

        function goHome() {
            window.speechSynthesis.cancel();
            document.getElementById('tv-iframe').src = "";
            document.getElementById('game-container').classList.add('hidden-section');
            document.getElementById('app-header').classList.add('hidden-section');
            document.getElementById('home-container').classList.remove('hidden-section');
        }
    </script>
</body>
