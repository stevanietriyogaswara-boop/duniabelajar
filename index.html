<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunia Belajar Anak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #f0f9ff;
            touch-action: manipulation;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        .kids-font { font-family: 'Fredoka One', cursive; }
        .card-bounce:active { transform: scale(0.95); }
        
        .hidden-section { display: none !important; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }

        .full-screen-center {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .progress-fill { transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes levelup {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); color: #facc15; }
            100% { transform: scale(1); }
        }
        .animate-levelup { animation: levelup 0.8s ease-out; }

        /* Background Music Control */
        #music-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 relative">

    <!-- Kontrol Musik -->
    <button id="music-toggle" onclick="toggleMusic()" class="bg-white/80 p-3 rounded-full shadow-lg border-2 border-blue-200 text-2xl">
        🔇
    </button>

    <!-- Header & Dashboard -->
    <div id="home-container" class="w-full max-w-2xl flex flex-col items-center">
        <div class="w-full bg-white rounded-3xl p-4 shadow-md mb-6 flex flex-col items-center border-b-4 border-blue-100">
            <div class="flex justify-between w-full items-center mb-2 px-2">
                <div class="flex items-center gap-2">
                    <span class="text-3xl">🏆</span>
                    <span id="level-badge" class="kids-font text-2xl text-blue-600">Level 1</span>
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-2xl">⭐</span>
                    <span id="total-stars" class="kids-font text-xl text-orange-500">0</span>
                </div>
            </div>
            <div class="w-full bg-gray-100 h-6 rounded-full overflow-hidden border-2 border-gray-50 p-1">
                <div id="progress-bar" class="progress-fill bg-gradient-to-r from-yellow-400 to-orange-500 h-full rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <header class="text-center mb-8">
            <h1 class="kids-font text-5xl text-blue-600 drop-shadow-md">Dunia Belajar</h1>
        </header>

        <main class="grid grid-cols-2 gap-4 w-full">
            <button onclick="showSection('angka')" class="bg-orange-400 p-6 rounded-3xl shadow-lg border-b-8 border-orange-600 text-white card-bounce flex flex-col items-center transition-transform hover:scale-105">
                <div class="text-5xl mb-2">🔢</div>
                <div class="kids-font text-xl">Angka</div>
            </button>
            <button onclick="showSection('huruf')" class="bg-blue-400 p-6 rounded-3xl shadow-lg border-b-8 border-blue-600 text-white card-bounce flex flex-col items-center transition-transform hover:scale-105">
                <div class="text-5xl mb-2">🔤</div>
                <div class="kids-font text-xl">Huruf</div>
            </button>
            <button onclick="showSection('warna')" class="bg-green-400 p-6 rounded-3xl shadow-lg border-b-8 border-green-600 text-white card-bounce flex flex-col items-center transition-transform hover:scale-105">
                <div class="text-5xl mb-2">🎨</div>
                <div class="kids-font text-xl">Warna</div>
            </button>
            <button onclick="showSection('hewan')" class="bg-purple-400 p-6 rounded-3xl shadow-lg border-b-8 border-purple-600 text-white card-bounce flex flex-col items-center transition-transform hover:scale-105">
                <div class="text-5xl mb-2">🦁</div>
                <div class="kids-font text-xl">Hewan</div>
            </button>
        </main>
    </div>

    <!-- Game Container -->
    <div id="game-container" class="w-full max-w-2xl hidden-section">
        
        <!-- Angka -->
        <section id="angka" class="hidden-section full-screen-center text-center">
            <div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-orange-400">
                <h2 class="kids-font text-3xl text-orange-500 mb-4">Ayo Kenal Angka!</h2>
                <div class="bg-orange-50 p-6 rounded-2xl mb-6 min-h-[220px] flex flex-col items-center justify-center border-2 border-dashed border-orange-200">
                    <div id="big-number" class="text-9xl kids-font text-orange-500 floating">1</div>
                    <div id="number-objects" class="text-4xl mt-4 flex flex-wrap justify-center gap-2 h-20">🍎</div>
                </div>
                <div class="grid grid-cols-5 gap-2" id="number-grid"></div>
            </div>
        </section>

        <!-- Huruf -->
        <section id="huruf" class="hidden-section full-screen-center text-center">
            <div class="bg-white p-8 rounded-3xl shadow-xl border-4 border-blue-400">
                <h2 class="kids-font text-3xl text-blue-500 mb-6">Tebak Huruf</h2>
                <div id="letter-big" class="text-9xl kids-font text-blue-600 mb-8 floating cursor-pointer" onclick="speakCurrentLetter()">A</div>
                <p id="letter-word" class="text-2xl font-bold text-gray-700 mb-6 italic">A untuk Apel 🍎</p>
                <button onclick="nextLetter()" class="bg-blue-500 text-white px-8 py-4 rounded-full font-bold shadow-lg hover:bg-blue-600 text-xl card-bounce w-full">Lanjut ➔</button>
            </div>
        </section>

        <!-- Warna -->
        <section id="warna" class="hidden-section full-screen-center text-center">
            <div class="bg-white p-8 rounded-3xl shadow-xl border-4 border-green-400">
                <h2 class="kids-font text-3xl text-green-500 mb-6">Mengenal Warna</h2>
                <div id="color-box" class="w-full h-32 rounded-2xl mb-6 shadow-inner border-4 border-gray-100 transition-all duration-500 cursor-pointer" onclick="speakCurrentColor()"></div>
                <h3 id="color-name" class="kids-font text-4xl mb-6 uppercase tracking-widest">Merah</h3>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="changeColor('Merah', '#ef4444')" class="h-16 rounded-xl bg-red-500 shadow-md border-b-4 border-red-700 active:translate-y-1"></button>
                    <button onclick="changeColor('Biru', '#3b82f6')" class="h-16 rounded-xl bg-blue-500 shadow-md border-b-4 border-blue-700 active:translate-y-1"></button>
                    <button onclick="changeColor('Hijau', '#22c55e')" class="h-16 rounded-xl bg-green-500 shadow-md border-b-4 border-green-700 active:translate-y-1"></button>
                    <button onclick="changeColor('Kuning', '#eab308')" class="h-16 rounded-xl bg-yellow-400 shadow-md border-b-4 border-yellow-600 active:translate-y-1"></button>
                    <button onclick="changeColor('Oranye', '#f97316')" class="h-16 rounded-xl bg-orange-500 shadow-md border-b-4 border-orange-700 active:translate-y-1"></button>
                    <button onclick="changeColor('Ungu', '#a855f7')" class="h-16 rounded-xl bg-purple-500 shadow-md border-b-4 border-purple-700 active:translate-y-1"></button>
                </div>
            </div>
        </section>

        <!-- Hewan -->
        <section id="hewan" class="hidden-section full-screen-center text-center">
            <div class="bg-white p-8 rounded-3xl shadow-xl border-4 border-purple-400">
                <h2 class="kids-font text-3xl text-purple-500 mb-6">Suara Hewan</h2>
                <div id="animal-emoji" class="text-9xl mb-4 floating cursor-pointer" onclick="speakAnimal()">🦁</div>
                <h3 id="animal-name" class="kids-font text-3xl text-gray-700 mb-8 uppercase tracking-widest">Singa</h3>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="pickAnimal('🦁', 'Singa', 'Rawrrr!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-5xl border-b-4 border-gray-200">🦁</button>
                    <button onclick="pickAnimal('🐱', 'Kucing', 'Meong!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-5xl border-b-4 border-gray-200">🐱</button>
                    <button onclick="pickAnimal('🐶', 'Anjing', 'Guk Guk!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-5xl border-b-4 border-gray-200">🐶</button>
                    <button onclick="pickAnimal('🐮', 'Sapi', 'Mooo!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-5xl border-b-4 border-gray-200">🐮</button>
                    <button onclick="pickAnimal('🐥', 'Ayam', 'Petok Petok!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-5xl border-b-4 border-gray-200">🐥</button>
                    <button onclick="pickAnimal('🐘', 'Gajah', 'Preeeet!')" class="p-4 bg-gray-50 rounded-2xl active:bg-purple-100 text-5xl border-b-4 border-gray-200">🐘</button>
                </div>
            </div>
        </section>

        <!-- Tombol Kembali -->
        <div class="w-full flex justify-center mt-8">
            <button onclick="goHome()" class="bg-gray-800 text-white px-10 py-4 rounded-full font-bold shadow-lg flex items-center gap-2 card-bounce text-lg">
                🏠 Selesai Main
            </button>
        </div>
    </div>

    <!-- Audio Elements (Dummy SFX using Speech Synthesis for variety) -->
    <script>
        // --- State Management ---
        let stars = 0;
        let level = 1;
        const starsPerLevel = 10;
        let isMusicPlaying = false;

        // Context Audio for SFX
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playDing() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        function toggleMusic() {
            const btn = document.getElementById('music-toggle');
            isMusicPlaying = !isMusicPlaying;
            btn.innerText = isMusicPlaying ? '🎵' : '🔇';
            if(isMusicPlaying) say("Musik dinyalakan!");
        }

        function triggerConfetti() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff']
            });
        }

        function addStar(amount = 1) {
            stars += amount;
            playDing();
            updateDashboard();
            if (stars >= level * starsPerLevel) levelUp();
        }

        function updateDashboard() {
            document.getElementById('total-stars').innerText = stars;
            document.getElementById('level-badge').innerText = "Level " + level;
            let currentLevelProgress = stars % starsPerLevel;
            let percentage = (currentLevelProgress / starsPerLevel) * 100;
            document.getElementById('progress-bar').style.width = percentage + "%";
        }

        function levelUp() {
            level++;
            triggerConfetti();
            say("Horeeee! Luar biasa! Kamu naik ke level " + level + ". Kamu anak pintar!");
            const badge = document.getElementById('level-badge');
            badge.classList.add('animate-levelup');
            setTimeout(() => badge.classList.remove('animate-levelup'), 800);
            updateDashboard();
        }

        // --- Voice Over System ---
        function say(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.lang = 'id-ID';
                msg.rate = 0.9; 
                msg.pitch = 1.4; // Lebih tinggi agar terdengar lebih ceria untuk anak
                window.speechSynthesis.speak(msg);
            }
        }

        const alphabets = [
            { h: 'A', w: 'Apel', e: '🍎' }, { h: 'B', w: 'Bola', e: '⚽' }, { h: 'C', w: 'Cicak', e: '🦎' },
            { h: 'D', w: 'Donat', e: '🍩' }, { h: 'E', w: 'Es Krim', e: '🍦' }, { h: 'F', w: 'Flamingo', e: '🦩' },
            { h: 'G', w: 'Gajah', e: '🐘' }, { h: 'H', w: 'Hujan', e: '🌧️' }, { h: 'I', w: 'Ikan', e: '🐟' },
            { h: 'J', w: 'Jerapah', e: '🦒' }, { h: 'K', w: 'Kucing', e: '🐱' }
        ];
        
        const numberEmojis = ['🍎', '⭐️', '🎈', '🍬', '🚗', '🐥', '🍄', '🍪', '🐝', '🎨'];
        let letterIdx = 0;
        let activeColor = "Merah";
        let activeAnimal = { name: "Singa", sound: "Rawrr" };

        function showSection(id) {
            document.getElementById('home-container').classList.add('hidden-section');
            document.getElementById('game-container').classList.remove('hidden-section');
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            window.scrollTo(0,0);

            if(id === 'angka') { say("Ayo belajar angka bersama-sama!"); initNumbers(); }
            if(id === 'huruf') { say("Mari mengenal huruf!"); updateLetterUI(); }
            if(id === 'warna') { say("Warna apa ini ya?"); changeColor('Merah', '#ef4444'); }
            if(id === 'hewan') { say("Ayo dengar suara hewan lucu!"); pickAnimal('🦁', 'Singa', 'Rawrrr!'); }
        }

        function goHome() {
            triggerConfetti();
            document.getElementById('game-container').classList.add('hidden-section');
            document.getElementById('home-container').classList.remove('hidden-section');
            say("Hebat sekali! Main lagi nanti ya!");
        }

        // --- Angka ---
        function initNumbers() {
            const grid = document.getElementById('number-grid');
            grid.innerHTML = '';
            for(let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = "bg-orange-100 p-4 rounded-xl text-2xl kids-font text-orange-600 border-b-4 border-orange-200 shadow-sm active:bg-orange-300";
                btn.innerText = i;
                btn.onclick = () => selectNumber(i);
                grid.appendChild(btn);
            }
            selectNumber(1);
        }

        function selectNumber(num) {
            const displayNum = document.getElementById('big-number');
            const displayObj = document.getElementById('number-objects');
            displayNum.innerText = num;
            
            displayNum.style.animation = 'none';
            displayNum.offsetHeight; 
            displayNum.style.animation = 'float 3s ease-in-out infinite';

            const emoji = numberEmojis[num-1] || '🍎';
            displayObj.innerHTML = '';
            for(let i = 0; i < num; i++) {
                const span = document.createElement('span');
                span.innerText = emoji;
                span.className = "inline-block animate-bounce";
                span.style.animationDelay = (i * 0.1) + "s";
                displayObj.appendChild(span);
            }
            say("Satu, dua, tiga... Ini adalah angka " + num);
            addStar(1);
        }

        // --- Huruf ---
        function updateLetterUI() {
            const item = alphabets[letterIdx];
            document.getElementById('letter-big').innerText = item.h;
            document.getElementById('letter-word').innerText = item.h + " untuk " + item.w + " " + item.e;
            speakCurrentLetter();
        }

        function nextLetter() {
            triggerConfetti();
            addStar(2);
            letterIdx = (letterIdx + 1) % alphabets.length;
            updateLetterUI();
        }

        function speakCurrentLetter() {
            const item = alphabets[letterIdx];
            say("Huruf " + item.h + "... " + item.h + " untuk " + item.w);
        }

        // --- Warna ---
        function changeColor(name, hex) {
            activeColor = name;
            const box = document.getElementById('color-box');
            const text = document.getElementById('color-name');
            box.style.backgroundColor = hex;
            text.innerText = name;
            text.style.color = hex;
            say("Ini adalah warna " + name);
            addStar(1);
        }

        function speakCurrentColor() {
            say("Warna " + activeColor);
        }

        // --- Hewan ---
        function pickAnimal(emoji, name, sound) {
            activeAnimal = { name, sound };
            document.getElementById('animal-emoji').innerText = emoji;
            document.getElementById('animal-name').innerText = name;
            say("Ini adalah " + name + "... Suaranya adalah: " + sound);
            addStar(1);
        }

        function speakAnimal() {
            say(activeAnimal.name + "... " + activeAnimal.sound);
        }

        // Init
        updateDashboard();
    </script>
</body>
</html>
