<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunia Belajar Anak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #f0f9ff;
            touch-action: manipulation;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .kids-font { font-family: 'Fredoka One', cursive; }
        .card-bounce:active { transform: scale(0.92); }
        .hidden-section { display: none !important; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
        
        .grid-scroll {
            max-height: 55vh;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .tv-frame {
            background: #334155;
            padding: 12px;
            border-radius: 1.5rem;
            border-bottom: 8px solid #1e293b;
            position: relative;
            margin-bottom: 15px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 0.5rem;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #start-overlay {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        .animal-card, .car-card {
            transition: all 0.2s;
        }
        .animal-card:active, .car-card:active {
            transform: scale(0.9);
            background-color: #f3e8ff;
        }

        .grid-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .grid-scroll::-webkit-scrollbar-thumb {
            background-color: #ddd;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 relative text-slate-800">

    <!-- LAYAR MULAI -->
    <div id="start-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center text-white">
        <div class="text-9xl mb-4 floating">🌟</div>
        <h1 class="kids-font text-5xl mb-8 text-center px-4 drop-shadow-lg text-yellow-300">Dunia Belajar</h1>
        <button onclick="startApp()" class="bg-yellow-400 text-blue-900 px-10 py-5 rounded-full kids-font text-3xl shadow-xl border-b-8 border-yellow-600 active:translate-y-2 active:border-b-0 transition-all">
            ▶ MULAI!
        </button>
    </div>

    <!-- BERANDA UTAMA -->
    <div id="home-container" class="w-full max-w-2xl flex flex-col items-center hidden-section">
        <div class="w-full bg-white rounded-3xl p-4 shadow-md mb-6 flex flex-col items-center border-b-4 border-blue-100">
            <div class="flex justify-between w-full items-center mb-2 px-2">
                <div class="flex items-center gap-2">
                    <span class="text-3xl">🏆</span>
                    <span id="level-badge" class="kids-font text-2xl text-blue-600">Level 1</span>
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-2xl">⭐</span>
                    <span id="total-stars" class="kids-font text-xl text-orange-500">0</span>
                </div>
            </div>
            <div class="w-full bg-gray-100 h-6 rounded-full overflow-hidden p-1">
                <div id="progress-bar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <main class="grid grid-cols-2 gap-4 w-full px-2 overflow-y-auto pb-10">
            <button onclick="showSection('angka')" class="bg-orange-400 p-6 rounded-3xl shadow-lg border-b-8 border-orange-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🔢</div>
                <div class="kids-font text-xl">Angka</div>
            </button>
            <button onclick="showSection('huruf')" class="bg-blue-400 p-6 rounded-3xl shadow-lg border-b-8 border-blue-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🔤</div>
                <div class="kids-font text-xl">Huruf</div>
            </button>
            <button onclick="showSection('warna')" class="bg-green-400 p-6 rounded-3xl shadow-lg border-b-8 border-green-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🎨</div>
                <div class="kids-font text-xl">Warna</div>
            </button>
            <button onclick="showSection('hewan')" class="bg-purple-400 p-6 rounded-3xl shadow-lg border-b-8 border-purple-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🦁</div>
                <div class="kids-font text-xl">Hewan</div>
            </button>
            <button onclick="showSection('mobil')" class="bg-slate-700 p-6 rounded-3xl shadow-lg border-b-8 border-slate-900 text-white card-bounce flex flex-col items-center col-span-2">
                <div class="text-5xl mb-2">🏎️</div>
                <div class="kids-font text-xl">Kendaraan</div>
            </button>
            <button onclick="showSection('cocok')" class="bg-red-400 p-4 rounded-3xl shadow-lg border-b-8 border-red-600 text-white card-bounce flex flex-col items-center">
                <div class="text-4xl mb-2">🧩</div>
                <div class="kids-font text-lg">Cocokkan</div>
            </button>
            <button onclick="showSection('video')" class="bg-rose-500 p-4 rounded-3xl shadow-lg border-b-8 border-rose-700 text-white card-bounce flex flex-col items-center">
                <div class="text-4xl mb-2">📺</div>
                <div class="kids-font text-lg">Video TV</div>
            </button>
        </main>
    </div>

    <!-- GAME CONTAINER -->
    <div id="game-container" class="w-full max-w-2xl hidden-section">
        
        <section id="angka" class="hidden-section text-center"><div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-orange-400"><h2 class="kids-font text-3xl text-orange-500 mb-4">Kenal Angka</h2><div class="bg-orange-50 p-6 rounded-2xl mb-6 min-h-[200px] flex flex-col items-center justify-center border-2 border-dashed border-orange-200"><div id="big-number" class="text-9xl kids-font text-orange-500 floating">1</div><div id="number-objects" class="text-4xl mt-4 flex flex-wrap justify-center gap-2"></div></div><div class="grid grid-cols-5 gap-2 grid-scroll" id="number-grid"></div></div></section>
        
        <section id="huruf" class="hidden-section text-center"><div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-blue-400"><h2 class="kids-font text-3xl text-blue-500 mb-4">Kenal Huruf</h2><div class="bg-blue-50 p-6 rounded-2xl mb-6 min-h-[200px] flex flex-col items-center justify-center border-2 border-dashed border-blue-200"><div id="letter-big" class="text-9xl kids-font text-blue-600 floating">A</div><p id="letter-word" class="text-2xl font-bold text-gray-700 mt-2 uppercase"></p></div><div class="grid grid-cols-6 gap-2 grid-scroll" id="letter-grid"></div></div></section>

        <section id="mobil" class="hidden-section text-center">

        <div class="w-full flex justify-center mt-6 mb-10">

    <script>
        let stars = 0;
        let isAppStarted = false;

        // Fungsi Getar (Haptic Feedback)
        function vibrateDevice(ms = 30) {
            if (navigator.vibrate) {
                navigator.vibrate(ms);
            }
        }

        function startApp() {
            isAppStarted = true;
            vibrateDevice(50);
            document.getElementById('start-overlay').classList.add('hidden-section');
            document.getElementById('home-container').classList.remove('hidden-section');
            speakRealistic("Ayo belajar bersama!");
        }

        function speakRealistic(text) {
            if (!isAppStarted) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            msg.pitch = 1.2;
            msg.rate = 1;
            window.speechSynthesis.speak(msg);
        }

        function addStar(amount = 1) {
            stars += amount;
            document.getElementById('total-stars').innerText = stars;
            document.getElementById('level-badge').innerText = "Level " + (Math.floor(stars/20) + 1);
            document.getElementById('progress-bar').style.width = ((stars % 20) * 5) + "%";
            if (stars > 0 && stars % 20 === 0) {
                confetti();
                vibrateDevice([100, 50, 100]); // Getar pola untuk naik level
                speakRealistic("Luar biasa! Kamu naik level!");
            }
        }

            {e:'🚑',n:'Ambulans',t:'emergency'},{e:'🚒',n:'Pemadam Kebakaran',t:'emergency'},{e:'🚓',n:'Mobil Polisi',t:'emergency'},{e:'🚔',n:'Patroli Polisi',t:'emergency'},{e:'🚁',n:'Helikopter Penyelamat',t:'emergency'},
            {e:'🚜',n:'Traktor Sawah',t:'work'},{e:'🏗️',n:'Derek Konstruksi',t:'work'},{e:'🚛',n:'Truk Besar',t:'work'},{e:'🛻',n:'Mobil Pickup',t:'work'},
            {e:'🚀',n:'Roket Luar Angkasa',t:'air'},{e:'✈️',n:'Pesawat Terbang',t:'air'},{e:'🛫',n:'Pesawat Lepas Landas',t:'air'},{e:'🛬',n:'Pesawat Mendarat',t:'air'},{e:'🪂',n:'Parasut',t:'air'},{e:'🛸',n:'Pesawat UFO',t:'air'},{e:'🚁',n:'Helikopter',t:'air'},

        const colors = [{n:'Merah',h:'#ef4444'},{n:'Biru',h:'#3b82f6'},{n:'Hijau',h:'#22c55e'},{n:'Kuning',h:'#eab308'},{n:'Oranye',h:'#f97316'},{n:'Ungu',h:'#a855f7'},{n:'Pink',h:'#f472b6'},{n:'Cokelat',h:'#78350f'},{n:'Hitam',h:'#000000'}];

        // --- LOGIKA VIDEO SEARCH ---
        async function searchYoutube(query) {
            if (!query || query.trim() === "") return;
            vibrateDevice(20);
            const list = document.getElementById('video-list');
            list.innerHTML = `<div class="text-rose-500 kids-font p-10">Mencari video ${query}...</div>`;
            speakRealistic("Mencari video " + query);
            const safeQuery = encodeURIComponent(query + " anak edukasi kartun");
            list.innerHTML = `
                <div class="tv-frame shadow-xl">
                    <h3 class="kids-font text-white mb-2 text-sm text-center">Video: ${query}</h3>
                    <div class="video-wrapper">
                        <iframe src="https://www.youtube.com/embed?listType=search&list=${safeQuery}" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
            `;
            document.getElementById('yt-search-input').value = '';
        }

        // --- LOGIKA PUZZLE ---
        function initPuzzle() {
            const pool = [...animalDB.slice(0, 15), ...carDB.slice(0, 15)];
            const target = pool[Math.floor(Math.random() * pool.length)];
            const targetEl = document.getElementById('puzzle-target');
            targetEl.innerText = target.e || target.h;
            targetEl.classList.add('opacity-20', 'grayscale');

            const options = [target];
            while(options.length < 3) {
                const rand = pool[Math.floor(Math.random() * pool.length)];
                if(!options.includes(rand)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            const optGrid = document.getElementById('puzzle-options');
            optGrid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "text-5xl p-4 bg-white rounded-2xl shadow-md border-b-4 border-slate-200 active:scale-90 transition-all";
                btn.innerText = opt.e || opt.h;
                btn.onclick = () => {
                    if(opt.e === target.e) {
                        vibrateDevice(60); // Getar lebih lama untuk jawaban benar
                        targetEl.classList.remove('opacity-20', 'grayscale');
                        confetti();
                        speakRealistic("Hebat! Benar!");
                        addStar(5);
                        setTimeout(initPuzzle, 2000);
                    } else {
                        vibrateDevice([30, 30, 30]); // Getar pendek 3x untuk salah
                        speakRealistic("Coba lagi sayang");
                    }
                };
                optGrid.appendChild(btn);
            });
        }

        // --- NAVIGASI & INIT ---
        function showSection(id) {
            vibrateDevice(30);
            document.getElementById('home-container').classList.add('hidden-section');
            document.getElementById('game-container').classList.remove('hidden-section');
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            
            if(id === 'angka') initNumbers();
            if(id === 'huruf') initLetters();
            if(id === 'mobil') initCars();
            if(id === 'warna') initColors();
            if(id === 'hewan') initAnimals();
            if(id === 'cocok') initPuzzle();
            if(id === 'video') initVideos();
        }

        function initNumbers() {
            const grid = document.getElementById('number-grid'); grid.innerHTML = '';
            for(let i=1; i<=20; i++) {
                const b = document.createElement('button');
                b.className = "bg-orange-100 p-4 rounded-xl kids-font text-orange-600 border-b-4 border-orange-200";
                b.innerText = i;
                b.onclick = () => {
                    vibrateDevice(20);
                    document.getElementById('big-number').innerText = i;
                    document.getElementById('number-objects').innerHTML = '🍎'.repeat(i);
                    speakRealistic(i); addStar(1);
                };
                grid.appendChild(b);
            }
        }

        function initLetters() {
            const grid = document.getElementById('letter-grid'); grid.innerHTML = '';
            alphabets.forEach(a => {
                const b = document.createElement('button');
                b.className = "bg-blue-100 p-3 rounded-xl kids-font text-blue-600 border-b-4 border-blue-200";
                b.innerText = a.h;
                b.onclick = () => {
                    vibrateDevice(20);
                    document.getElementById('letter-big').innerText = a.h;
                    document.getElementById('letter-word').innerText = a.w + " " + a.e;
                    speakRealistic(a.h + " untuk " + a.w); addStar(1);
                };
                grid.appendChild(b);
            });
        }

        function initCars() {
            const grid = document.getElementById('car-grid');
            const filter = document.getElementById('car-filter').value;
            grid.innerHTML = '';
            const filtered = filter === 'all' ? carDB : carDB.filter(c => c.t === filter);
            filtered.forEach(c => {
                const b = document.createElement('button');
                b.className = "p-3 bg-white rounded-xl text-4xl shadow car-card border-b-4 border-slate-200";
                b.innerText = c.e;
                b.onclick = () => {
                    vibrateDevice(20);
                    document.getElementById('car-emoji').innerText = c.e;
                    document.getElementById('car-name').innerText = c.n;
                    speakRealistic(c.n);
                    addStar(1);
                };
                grid.appendChild(b);
            });
        }

        function initColors() {
            const grid = document.getElementById('color-grid'); grid.innerHTML = '';
            colors.forEach(c => {
                const b = document.createElement('button'); b.className = "h-14 rounded-xl shadow active:scale-90 transition-all"; b.style.backgroundColor = c.h;
                b.onclick = () => { 
                    vibrateDevice(20);
                    document.getElementById('color-box').style.backgroundColor = c.h; 
                    document.getElementById('color-name').innerText = c.n; 
                    speakRealistic(c.n); addStar(1); 
                };
                grid.appendChild(b);
            });
        }

        function initAnimals() {
            const grid = document.getElementById('animal-grid'); 
            const filter = document.getElementById('animal-filter').value;
            grid.innerHTML = '';
            const filtered = filter === 'all' ? animalDB : animalDB.filter(a => a.t === filter);
            filtered.forEach(a => {
                const b = document.createElement('button');
                b.className = "p-3 bg-white rounded-xl text-4xl shadow animal-card border-b-4 border-slate-100";
                b.innerText = a.e;
                b.onclick = () => {
                    vibrateDevice(20);
                    document.getElementById('animal-emoji').innerText = a.e;
                    document.getElementById('animal-name').innerText = a.n;
                    speakRealistic(a.n);
                    addStar(1);
                };
                grid.appendChild(b);
            });
        }

        function initVideos() {
            const tabs = document.getElementById('video-tabs'); tabs.innerHTML = '';
            const videoCats = { 'Lagu': ['m0kL6Yp_3-w'], 'Belajar': ['sqipk9j7AyU'], 'Kartun': ['K5qY7p-oE0U'] };
            Object.keys(videoCats).forEach((cat, idx) => {
                const b = document.createElement('button');
                b.className = `px-6 py-2 rounded-full kids-font text-sm whitespace-nowrap ${idx===0?'bg-rose-500 text-white':'bg-rose-100'}`;
                b.innerText = cat;
                b.onclick = () => {
                    vibrateDevice(20);
                    document.querySelectorAll('#video-tabs button').forEach(btn => btn.className = 'px-6 py-2 rounded-full kids-font text-sm bg-rose-100');
                    b.className = 'px-6 py-2 rounded-full kids-font text-sm bg-rose-500 text-white';
                    renderVideoList(videoCats[cat]);
                };
                tabs.appendChild(b);
            });
            renderVideoList(videoCats['Lagu']);
        }

        function renderVideoList(ids) {
            const list = document.getElementById('video-list'); list.innerHTML = '';
            ids.forEach(id => {
                const d = document.createElement('div'); d.className = "tv-frame";
                d.innerHTML = `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>`;
                list.appendChild(d);
            });
        }

        function goHome() {
            vibrateDevice(40);
            window.speechSynthesis.cancel();
            document.getElementById('game-container').classList.add('hidden-section');
            document.getElementById('home-container').classList.remove('hidden-section');
        }
    </script>
</body>
</html>
