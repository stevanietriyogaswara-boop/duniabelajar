<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunia Belajar Anak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #f0f9ff;
            touch-action: manipulation;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .kids-font { font-family: 'Fredoka One', cursive; }
        .card-bounce:active { transform: scale(0.92); }
        .hidden-section { display: none !important; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
        
        .grid-scroll {
            max-height: 40vh;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        /* Styling TV Anak Pintar */
        .tv-container {
            background: white;
            border-radius: 2rem;
            padding: 20px;
            border: 4px solid #ff7a8a;
            box-shadow: 0 10px 25px rgba(255, 122, 138, 0.2);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-bar {
            background: #fff;
            border: 3px solid #ffdee2;
            border-radius: 99px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn-cari {
            background: #ff4757;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: -60px;
            z-index: 10;
        }

        .video-box {
            background: #2f3542;
            border-radius: 1.5rem;
            padding: 12px;
            border-bottom: 8px solid #1e272e;
            position: relative;
        }

        .video-inner {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 1rem;
            background: #000;
        }

        .video-inner iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .tab-video {
            padding: 8px 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .tab-video.active {
            background: #ff4757;
            color: white;
        }

        .tab-video.inactive {
            background: #ffe0e3;
            color: #ff4757;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(240, 249, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 10px 15px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e0f2fe;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center relative text-slate-800">

    <!-- LAYAR MULAI -->
    <div id="start-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center text-white bg-gradient-to-br from-blue-500 to-purple-600">
        <div class="text-9xl mb-4 floating">🌟</div>
        <h1 class="kids-font text-5xl mb-8 text-center px-4 drop-shadow-lg text-yellow-300">Dunia Belajar</h1>
        <button onclick="startApp()" class="bg-yellow-400 text-blue-900 px-10 py-5 rounded-full kids-font text-3xl shadow-xl border-b-8 border-yellow-600 active:translate-y-2 active:border-b-0 transition-all">
            ▶ MULAI!
        </button>
    </div>

    <!-- HEADER NAVIGATION -->
    <div id="app-header" class="top-nav hidden-section">
        <button onclick="goHome()" class="bg-white p-2 px-5 rounded-2xl shadow-sm border-b-4 border-slate-200 flex items-center gap-2 active:scale-95 transition-transform">
            <span class="text-2xl">🏠</span>
            <span class="font-bold text-slate-700 uppercase">Menu Utama</span>
        </button>
        <div class="flex items-center gap-1 bg-white px-4 py-1 rounded-full shadow-inner border border-yellow-100">
            <span class="text-lg">⭐</span>
            <span id="total-stars-header" class="kids-font text-orange-500 text-xl">0</span>
        </div>
    </div>

    <!-- BERANDA UTAMA -->
    <div id="home-container" class="w-full max-w-2xl flex flex-col items-center p-4 hidden-section mt-2 overflow-y-auto no-scrollbar" style="max-height: 95vh;">
        <div class="w-full bg-white rounded-3xl p-4 shadow-md mb-4 flex flex-col items-center border-b-4 border-blue-100">
            <div class="flex justify-between w-full items-center mb-2 px-2">
                <div class="flex items-center gap-2">
                    <span class="text-3xl">🏆</span>
                    <span id="level-badge" class="kids-font text-2xl text-blue-600">Level 1</span>
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-2xl">⭐</span>
                    <span id="total-stars" class="kids-font text-xl text-orange-500">0</span>
                </div>
            </div>
            <div class="w-full bg-gray-100 h-6 rounded-full overflow-hidden p-1">
                <div id="progress-bar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <main class="grid grid-cols-2 gap-4 w-full px-2 pb-24">
            <button onclick="showSection('angka')" class="bg-orange-400 p-5 rounded-3xl shadow-lg border-b-8 border-orange-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🔢</div>
                <div class="kids-font text-lg leading-tight">ANGKA</div>
            </button>
            <button onclick="showSection('huruf')" class="bg-blue-400 p-5 rounded-3xl shadow-lg border-b-8 border-blue-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🔤</div>
                <div class="kids-font text-lg leading-tight">HURUF</div>
            </button>
            <button onclick="showSection('warna')" class="bg-green-400 p-5 rounded-3xl shadow-lg border-b-8 border-green-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🎨</div>
                <div class="kids-font text-lg leading-tight">WARNA</div>
            </button>
            <button onclick="showSection('hewan')" class="bg-purple-400 p-5 rounded-3xl shadow-lg border-b-8 border-purple-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🦁</div>
                <div class="kids-font text-lg leading-tight text-center">DUNIA HEWAN</div>
            </button>
            <button onclick="showSection('sehat')" class="bg-emerald-500 p-5 rounded-3xl shadow-lg border-b-8 border-emerald-700 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🍎</div>
                <div class="kids-font text-lg leading-tight text-center">MAKANAN SEHAT</div>
            </button>
            <button onclick="showSection('mobil')" class="bg-slate-700 p-5 rounded-3xl shadow-lg border-b-8 border-slate-900 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🚢</div>
                <div class="kids-font text-lg leading-tight text-center">KENDARAAN</div>
            </button>
            <button onclick="showSection('tv')" class="bg-red-400 p-5 rounded-3xl shadow-lg border-b-8 border-red-600 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">📺</div>
                <div class="kids-font text-lg leading-tight uppercase">VIDEO TV</div>
            </button>
            <button onclick="showSection('cocok')" class="bg-yellow-500 p-5 rounded-3xl shadow-lg border-b-8 border-yellow-700 text-white card-bounce flex flex-col items-center">
                <div class="text-5xl mb-2">🧩</div>
                <div class="kids-font text-lg uppercase">Uji Pintar</div>
            </button>
        </main>
    </div>

    <!-- GAME CONTAINER -->
    <div id="game-container" class="w-full max-w-2xl p-4 hidden-section">
        
        <!-- SECTION MAKANAN SEHAT (BUAH & SAYUR) -->
        <section id="sehat" class="hidden-section text-center">
            <div class="bg-white p-4 rounded-3xl shadow-xl border-4 border-emerald-400">
                <div class="flex justify-center gap-2 mb-4 bg-emerald-100 p-2 rounded-2xl">
                    <button onclick="filterFood('buah')" id="tab-food-buah" class="px-4 py-2 rounded-xl active font-bold text-xs bg-emerald-500 text-white">🍎 Buah</button>
                    <button onclick="filterFood('sayur')" id="tab-food-sayur" class="px-4 py-2 rounded-xl font-bold text-xs bg-emerald-200 text-emerald-700">🥦 Sayur</button>
                </div>
                <div class="bg-emerald-50 p-4 rounded-2xl mb-4 min-h-[140px] flex flex-col items-center justify-center border-2 border-dashed border-emerald-200">
                    <div id="food-emoji" class="text-7xl mb-1 floating">🍎</div>
                    <h3 id="food-name" class="kids-font text-xl text-emerald-800 uppercase">Apel</h3>
                </div>
                <div class="grid grid-cols-4 gap-2 grid-scroll" id="food-grid"></div>
            </div>
        </section>

        <!-- SECTION TV ANAK PINTAR -->
        <section id="tv" class="hidden-section text-center">
            <div class="tv-container">
                <h2 class="kids-font text-3xl text-red-500 mb-6">TV Anak Pintar</h2>
                <div class="search-bar">
                    <input type="text" id="tv-search-input" placeholder="Cari: Tayo, Lagu..." class="w-full bg-transparent outline-none font-bold text-gray-500">
                    <button onclick="handleSearch()" class="btn-cari">CARI</button>
                </div>
                <div class="flex justify-center gap-2 mb-4">
                    <button onclick="setTvCategory('lagu')" id="tab-v-lagu" class="tab-video active">Lagu</button>
                    <button onclick="setTvCategory('belajar')" id="tab-v-belajar" class="tab-video inactive">Belajar</button>
                    <button onclick="setTvCategory('kartun')" id="tab-v-kartun" class="tab-video inactive">Kartun</button>
                </div>
                <div class="video-box mb-4">
                    <div class="video-inner">
                        <iframe id="tv-iframe" src="" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
                <button onclick="refreshCurrentVideo()" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-4 rounded-2xl kids-font text-lg shadow-lg border-b-4 border-blue-700 active:translate-y-1 active:border-b-0 transition-all flex items-center justify-center gap-2">
                    🔄 CARI VIDEO LAIN
                </button>
            </div>
        </section>

        <!-- SECTION ANGKA -->
        <section id="angka" class="hidden-section text-center">
            <div class="bg-white p-4 rounded-3xl shadow-xl border-4 border-orange-400">
                <div class="bg-orange-50 p-4 rounded-2xl mb-4 min-h-[150px] flex flex-col items-center justify-center border-2 border-dashed border-orange-200">
                    <div id="big-number" class="text-8xl kids-font text-orange-500 floating">1</div>
                    <div id="number-objects" class="text-3xl mt-2 flex flex-wrap justify-center gap-1">🍎</div>
                </div>
                <div class="grid grid-cols-5 gap-2 grid-scroll" id="number-grid"></div>
            </div>
        </section>
        
        <!-- SECTION HURUF -->
        <section id="huruf" class="hidden-section text-center">
            <div class="bg-white p-4 rounded-3xl shadow-xl border-4 border-blue-400">
                <div class="bg-blue-50 p-4 rounded-2xl mb-4 min-h-[150px] flex flex-col items-center justify-center border-2 border-dashed border-blue-200">
                    <div id="letter-big" class="text-8xl kids-font text-blue-600 floating">A</div>
                    <p id="letter-word" class="text-xl font-bold text-gray-700 mt-2 uppercase">APEL 🍎</p>
                </div>
                <div class="grid grid-cols-6 gap-2 grid-scroll" id="letter-grid"></div>
            </div>
        </section>

        <!-- SECTION HEWAN -->
        <section id="hewan" class="hidden-section text-center">
            <div class="bg-white p-4 rounded-3xl shadow-xl border-4 border-purple-400">
                <div class="flex justify-center gap-2 mb-4 bg-purple-100 p-2 rounded-2xl">
                    <button onclick="filterAnimal('darat')" id="tab-animal-darat" class="px-4 py-2 rounded-xl active font-bold text-xs bg-purple-500 text-white">🦁 Darat</button>
                    <button onclick="filterAnimal('air')" id="tab-animal-air" class="px-4 py-2 rounded-xl font-bold text-xs bg-purple-200 text-purple-700">🐬 Air</button>
                    <button onclick="filterAnimal('udara')" id="tab-animal-udara" class="px-4 py-2 rounded-xl font-bold text-xs bg-purple-200 text-purple-700">🐦 Udara</button>
                </div>
                <div class="bg-purple-50 p-4 rounded-2xl mb-4 min-h-[140px] flex flex-col items-center justify-center border-2 border-dashed border-purple-200">
                    <div id="animal-emoji" class="text-7xl mb-1 floating">🦁</div>
                    <h3 id="animal-name" class="kids-font text-xl text-purple-800 uppercase">Singa</h3>
                </div>
                <div class="grid grid-cols-4 gap-2 grid-scroll" id="animal-grid"></div>
            </div>
        </section>

        <!-- SECTION KENDARAAN -->
        <section id="mobil" class="hidden-section text-center">
            <div class="bg-white p-4 rounded-3xl shadow-xl border-4 border-slate-700">
                <div class="flex justify-center gap-2 mb-4 bg-slate-200 p-2 rounded-2xl">
                    <button onclick="filterCar('darat')" id="tab-car-darat" class="px-4 py-2 rounded-xl active font-bold text-xs bg-slate-700 text-white">🚗 Darat</button>
                    <button onclick="filterCar('air')" id="tab-car-air" class="px-4 py-2 rounded-xl font-bold text-xs bg-slate-300 text-slate-700">🚢 Air</button>
                    <button onclick="filterCar('udara')" id="tab-car-udara" class="px-4 py-2 rounded-xl font-bold text-xs bg-slate-300 text-slate-700">🚀 Udara</button>
                </div>
                <div class="bg-slate-100 p-4 rounded-2xl mb-4 min-h-[140px] flex flex-col items-center justify-center border-2 border-dashed border-slate-300">
                    <div id="car-emoji" class="text-7xl floating mb-1">🏎️</div>
                    <h3 id="car-name" class="kids-font text-xl text-slate-800 uppercase">Mobil Balap</h3>
                </div>
                <div class="grid grid-cols-4 gap-2 grid-scroll" id="car-grid"></div>
            </div>
        </section>

        <!-- SECTION WARNA -->
        <section id="warna" class="hidden-section text-center">
            <div class="bg-white p-4 rounded-3xl shadow-xl border-4 border-green-400">
                <div id="color-box" class="w-full h-32 rounded-2xl mb-4 shadow-inner border-4 border-gray-100"></div>
                <h3 id="color-name" class="kids-font text-2xl mb-4 uppercase">Merah</h3>
                <div class="grid grid-cols-4 gap-2 grid-scroll" id="color-grid"></div>
            </div>
        </section>

        <!-- SECTION COCOK -->
        <section id="cocok" class="hidden-section text-center">
            <div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-yellow-500">
                <h2 class="kids-font text-2xl text-yellow-600 mb-2">Uji Pintar</h2>
                <div class="flex flex-col items-center gap-6 py-4">
                    <div id="puzzle-target" class="text-8xl opacity-20 grayscale filter bg-slate-100 p-8 rounded-full border-4 border-yellow-100 shadow-inner">❓</div>
                    <div class="grid grid-cols-3 gap-3" id="puzzle-options"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let stars = 0;
        let isAppStarted = false;
        let currentCategory = 'lagu';

        const videoRepo = {
            lagu: ["S2pE8m9x-bQ", "0V62-FAn9h4", "qB2T8Y6L_2k", "O5_jN22H_Y8", "8h3YV0vP8gA"],
            belajar: ["jZ_y-m0Bv6E", "Z8vUfCAn8-k", "5XfL3L0R7Y8", "yG-fX6n_Z8k", "W2M7eXpP9g8"],
            kartun: ["yR0W1rB-klo", "8n4D-fX9L8g", "3W2L7XpY6n8", "kO9L8fX4n2Y", "P9g8M7eXpW2"]
        };

        const foodDB = {
            buah: [{e:'🍎',n:'Apel'},{e:'🍌',n:'Pisang'},{e:'🍇',n:'Anggur'},{e:'🍓',n:'Stroberi'},{e:'🍊',n:'Jeruk'},{e:'🍉',n:'Semangka'},{e:'🍍',n:'Nanas'},{e:'🥭',n:'Mangga'}],
            sayur: [{e:'🥦',n:'Brokoli'},{e:'🥕',n:'Wortel'},{e:'🌽',n:'Jagung'},{e:'🍅',n:'Tomat'},{e:'🥬',n:'Sawi'},{e:'🥔',n:'Kentang'},{e:'🥒',n:'Timun'},{e:'🍆',n:'Terong'}]
        };

        const animalDB = {
            darat: [{e:'🦁',n:'Singa'},{e:'🐘',n:'Gajah'},{e:'🦒',n:'Jerapah'},{e:'🐯',n:'Harimau'},{e:'🦓',n:'Zebra'},{e:'🐒',n:'Monyet'},{e:'🐎',n:'Kuda'},{e:'🐄',n:'Sapi'}],
            air: [{e:'🐋',n:'Paus'},{e:'🐬',n:'Lumba-lumba'},{e:'🦈',n:'Hiu'},{e:'🐙',n:'Gurita'},{e:'🦀',n:'Kepiting'},{e:'🐠',n:'Ikan'}],
            udara: [{e:'🦅',n:'Elang'},{e:'🦉',n:'Burung Hantu'},{e:'🦜',n:'Beo'},{e:'🦋',n:'Kupu-kupu'},{e:'🐝',n:'Lebah'},{e:'🦢',n:'Angsa'}]
        };

        const carDB = {
            darat: [{e:'🚗',n:'Mobil'},{e:'🚌',n:'Bus'},{e:'🚓',n:'Polisi'},{e:'🚑',n:'Ambulans'},{e:'🚒',n:'Pemadam'},{e:'🚚',n:'Truk'},{e:'🚂',n:'Kereta'}],
            air: [{e:'🚢',n:'Kapal'},{e:'⛵',n:'Perahu'},{e:'🛥️',n:'Speedboat'}],
            udara: [{e:'✈️',n:'Pesawat'},{e:'🚁',n:'Helikopter'},{e:'🚀',n:'Roket'}]
        };

        const alphabets = [{h:'A',w:'Apel',e:'🍎'},{h:'B',w:'Bola',e:'⚽'},{h:'C',w:'Cicak',e:'🦎'},{h:'D',w:'Donat',e:'🍩'},{h:'E',w:'Eskrim',e:'🍦'},{h:'F',w:'Foto',e:'🖼️'},{h:'G',w:'Gajah',e:'🐘'},{h:'H',w:'Harimau',e:'🐯'},{h:'I',w:'Ikan',e:'🐟'},{h:'J',w:'Jerapah',e:'🦒'},{h:'K',w:'Kucing',e:'🐱'},{h:'L',w:'Lampu',e:'💡'},{h:'M',w:'Mobil',e:'🚗'}];
        const colors = [{n:'Merah',h:'#ef4444'},{n:'Biru',h:'#3b82f6'},{n:'Hijau',h:'#22c55e'},{n:'Kuning',h:'#eab308'},{n:'Ungu',h:'#a855f7'},{n:'Oren',h:'#f97316'},{n:'Pink',h:'#ec4899'}];

        function vibrateDevice(ms = 30) { if (navigator.vibrate) navigator.vibrate(ms); }

        function startApp() {
            isAppStarted = true;
            document.getElementById('start-overlay').classList.add('hidden-section');
            document.getElementById('home-container').classList.remove('hidden-section');
            speakRealistic("Halo sayang, ayo belajar dan bermain!");
        }

        function speakRealistic(text) {
            if (!isAppStarted) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            msg.pitch = 1.2; 
            msg.rate = 1;
            window.speechSynthesis.speak(msg);
        }

        function addStar(amount = 1) {
            stars += amount;
            document.getElementById('total-stars').innerText = stars;
            document.getElementById('total-stars-header').innerText = stars;
            document.getElementById('level-badge').innerText = "Level " + (Math.floor(stars/30) + 1);
            document.getElementById('progress-bar').style.width = ((stars % 30) * 3.33) + "%";
        }

        function showSection(id) {
            vibrateDevice(30);
            document.getElementById('home-container').classList.add('hidden-section');
            document.getElementById('app-header').classList.remove('hidden-section');
            document.getElementById('game-container').classList.remove('hidden-section');
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            
            if(id === 'tv') setTvCategory('lagu');
            if(id === 'sehat') filterFood('buah');
            if(id === 'angka') initNumbers(); 
            if(id === 'huruf') initLetters(); 
            if(id === 'hewan') filterAnimal('darat');
            if(id === 'mobil') filterCar('darat');
            if(id === 'warna') initColors();
            if(id === 'cocok') initPuzzle();
        }

        function filterFood(type) {
            const tabs = ['buah', 'sayur'];
            tabs.forEach(t => {
                const b = document.getElementById(`tab-food-${t}`);
                b.className = "px-4 py-2 rounded-xl font-bold text-xs " + (t === type ? "bg-emerald-500 text-white" : "bg-emerald-200 text-emerald-700");
            });
            initGallery(foodDB[type], 'food-grid', 'food-emoji', 'food-name');
        }

        function setTvCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-video').forEach(b => {
                b.classList.remove('active');
                b.classList.add('inactive');
            });
            document.getElementById(`tab-v-${cat}`).classList.add('active');
            document.getElementById(`tab-v-${cat}`).classList.remove('inactive');
            const videoId = videoRepo[cat][0];
            document.getElementById('tv-iframe').src = `https://www.youtube.com/embed/${videoId}`;
        }

        function refreshCurrentVideo() {
            vibrateDevice(50);
            const list = videoRepo[currentCategory];
            const randomId = list[Math.floor(Math.random() * list.length)];
            const iframe = document.getElementById('tv-iframe');
            iframe.src = "";
            setTimeout(() => {
                iframe.src = `https://www.youtube.com/embed/${randomId}?autoplay=1`;
                speakRealistic("Mencari video lainnya");
            }, 100);
        }

        function handleSearch() {
            const query = document.getElementById('tv-search-input').value;
            if(!query) return;
            document.getElementById('tv-iframe').src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query)}`;
            speakRealistic("Mencari video " + query);
        }

        function filterAnimal(type) {
            const tabs = ['darat', 'air', 'udara'];
            tabs.forEach(t => {
                const b = document.getElementById(`tab-animal-${t}`);
                b.className = "px-4 py-2 rounded-xl font-bold text-xs " + (t === type ? "bg-purple-500 text-white" : "bg-purple-200 text-purple-700");
            });
            initGallery(animalDB[type], 'animal-grid', 'animal-emoji', 'animal-name');
        }

        function filterCar(type) {
            const tabs = ['darat', 'air', 'udara'];
            tabs.forEach(t => {
                const b = document.getElementById(`tab-car-${t}`);
                b.className = "px-4 py-2 rounded-xl font-bold text-xs " + (t === type ? "bg-slate-700 text-white" : "bg-slate-300 text-slate-700");
            });
            initGallery(carDB[type], 'car-grid', 'car-emoji', 'car-name');
        }

        function initGallery(db, gridId, emojiId, nameId) {
            const grid = document.getElementById(gridId); grid.innerHTML = '';
            db.forEach(item => {
                const b = document.createElement('button');
                b.className = `p-3 bg-white rounded-xl text-4xl shadow border-b-4 border-slate-100 active:scale-95 flex items-center justify-center`;
                b.innerText = item.e;
                b.onclick = () => {
                    document.getElementById(emojiId).innerText = item.e;
                    document.getElementById(nameId).innerText = item.n;
                    speakRealistic(item.n); addStar(1);
                };
                grid.appendChild(b);
            });
        }

        function initNumbers() {
            const grid = document.getElementById('number-grid'); grid.innerHTML = '';
            for(let i=1; i<=20; i++) {
                const b = document.createElement('button');
                b.className = "bg-orange-100 p-4 rounded-xl kids-font text-orange-600 border-b-4 border-orange-200 active:scale-95";
                b.innerText = i;
                b.onclick = () => {
                    document.getElementById('big-number').innerText = i;
                    document.getElementById('number-objects').innerHTML = '🍎'.repeat(i);
                    speakRealistic(i); addStar(1);
                };
                grid.appendChild(b);
            }
        }

        function initLetters() {
            const grid = document.getElementById('letter-grid'); grid.innerHTML = '';
            alphabets.forEach(a => {
                const b = document.createElement('button');
                b.className = "bg-blue-100 p-3 rounded-xl kids-font text-blue-600 border-b-4 border-blue-200 active:scale-95";
                b.innerText = a.h;
                b.onclick = () => {
                    document.getElementById('letter-big').innerText = a.h;
                    document.getElementById('letter-word').innerText = a.w + " " + a.e;
                    speakRealistic(a.h + " untuk " + a.w); addStar(1);
                };
                grid.appendChild(b);
            });
        }

        function initColors() {
            const grid = document.getElementById('color-grid'); grid.innerHTML = '';
            colors.forEach(c => {
                const b = document.createElement('button'); b.className = "h-12 rounded-xl shadow border-4 border-white active:scale-95"; b.style.backgroundColor = c.h;
                b.onclick = () => { 
                    document.getElementById('color-box').style.backgroundColor = c.h; 
                    document.getElementById('color-name').innerText = c.n; 
                    speakRealistic(c.n); addStar(1); 
                };
                grid.appendChild(b);
            });
        }

        function initPuzzle() {
            const pool = [...animalDB.darat, ...carDB.darat, ...alphabets, ...foodDB.buah];
            const target = pool[Math.floor(Math.random() * pool.length)];
            const targetEl = document.getElementById('puzzle-target');
            targetEl.innerText = target.e || target.h;
            targetEl.classList.add('opacity-20', 'grayscale');

            const options = [target];
            while(options.length < 3) {
                const rand = pool[Math.floor(Math.random() * pool.length)];
                if(!options.includes(rand)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            const optGrid = document.getElementById('puzzle-options');
            optGrid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "text-[10px] font-bold p-3 bg-white rounded-2xl shadow-md border-b-4 border-slate-200 active:scale-90 flex items-center justify-center text-center uppercase h-20 w-20";
                btn.innerText = opt.n || opt.w;
                btn.onclick = () => {
                    if(opt === target) {
                        targetEl.classList.remove('opacity-20', 'grayscale');
                        confetti(); speakRealistic("Hebat! Kamu pintar sekali!");
                        addStar(10); setTimeout(initPuzzle, 2000);
                    } else {
                        vibrateDevice(100); speakRealistic("Ayo coba lagi!");
                    }
                };
                optGrid.appendChild(btn);
            });
        }

        function goHome() {
            window.speechSynthesis.cancel();
            document.querySelectorAll('iframe').forEach(f => f.src = "");
            document.getElementById('game-container').classList.add('hidden-section');
            document.getElementById('app-header').classList.add('hidden-section');
            document.getElementById('home-container').classList.remove('hidden-section');
        }
    </script>
</body>
</html>
